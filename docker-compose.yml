version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: trans_new_app
    container_name: trans_new_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    # Environment variables are managed in .env file
    ports:
      - "9000:9000"

  webserver:
    image: nginx:alpine
    container_name: trans_new_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
